name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.6'
          channel: 'stable'

      - name: Enable Flutter Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

  build-linux:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.6'
          channel: 'stable'

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev cmake ninja-build

      - name: Enable Flutter Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build release bundle
        run: flutter build linux --release

      - name: Build CLI binary
        run: dart compile exe bin/leenx.dart -o build/leenx_cli

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: leenx-linux-x64
          path: |
            build/linux/x64/release/bundle/
            build/leenx_cli

  release:
    needs: [test, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: leenx-linux-x64
          path: dist

      - name: Create release archive
        run: |
          mkdir -p leenx-${{ github.ref_name }}-linux-x64
          cp -r dist/bundle leenx-${{ github.ref_name }}-linux-x64/
          cp dist/leenx_cli leenx-${{ github.ref_name }}-linux-x64/leenx
          chmod +x leenx-${{ github.ref_name }}-linux-x64/leenx
          tar -czf leenx-${{ github.ref_name }}-linux-x64.tar.gz leenx-${{ github.ref_name }}-linux-x64/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Leenx Installer ${{ github.ref_name }}
          body: See [CHANGELOG.md](https://github.com/AxDSan/leenx-installer/blob/main/CHANGELOG.md) for details.
          files: |
            leenx-${{ github.ref_name }}-linux-x64.tar.gz
            dist/leenx_cli
          draft: false
          prerelease: false
          generate_release_notes: true
